<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none" xmlns:xlink="http://www.w3.org/1999/xlink">

  <!-- MARK: Filled crescent shapes — crisp at any size -->

  <!-- Outer crescent (navy) -->
  <path d="
    M 32 4
    A 28 28 0 1 1 4 32
    A 28 28 0 1 0 32 4 Z
  " fill="none"/>

  <!-- Clean outer ring arc using clip approach -->
  <!-- Outer full circle -->
  <circle cx="32" cy="32" r="28" fill="#2B3A67"/>
  <!-- Cut inner circle to create crescent -->
  <circle cx="36" cy="32" r="21" fill="#ffffff"/>

  <!-- Inner accent arc (steel blue) — smaller offset crescent -->
  <circle cx="36" cy="32" r="18" fill="#3D5A80"/>
  <!-- Cut center -->
  <circle cx="40" cy="32" r="13" fill="#ffffff"/>

  <!-- Core dot -->
  <circle cx="40" cy="32" r="5" fill="#2B3A67"/>

  <!-- WORDMARK -->
  <!-- ELITE — bold navy -->
  <text x="76" y="28" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-size="22" font-weight="900" fill="#2B3A67" letter-spacing="1.5">ELITE</text>

  <!-- BUSINESS SYSTEMS — light gray tracked -->
  <text x="78" y="48" font-family="Arial, Helvetica, sans-serif" font-size="9.5" font-weight="500" fill="#808080" letter-spacing="4.2">BUSINESS SYSTEMS</text>

</svg>
